name: CI/CD Simulation (GitHub Hosted)

on:
  push:
    branches:
      - main

jobs:
  build-test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Run App (Simulation)
        run: |
          nohup python app.py &
          sleep 5
          curl http://127.0.0.1:5000
